app-id: com.m3p.flutter
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: m3p_flutter

add-extensions:
  org.freedesktop.Platform.ffmpeg-full:
    version: '24.08'
    directory: lib/ffmpeg
    add-ld-path: .

cleanup-commands:
  - mkdir -p ${FLATPAK_DEST}/lib/ffmpeg

finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio

modules:
  - name: libmpv
    cleanup:
      - /share/bash-completion
      - /share/zsh
      - /share/doc
      - /share/icons
      - /share/applications
    buildsystem: meson
    config-opts:
      - -Dlibmpv=true
      - -Dcplayer=false
      - -Dlua=disabled
      - -Ddebug=false
      - -Dbuild-date=false
      - -Dalsa=disabled
      - -Dmanpage-build=disabled
      - -Dvulkan=enabled
    sources:
      - type: archive
        url: https://github.com/mpv-player/mpv/archive/refs/tags/v0.40.0.tar.gz
        sha256: 10a0f4654f62140a6dd4d380dcf0bbdbdcf6e697556863dc499c296182f081a3
    modules:
      - name: libplacebo
        buildsystem: meson
        config-opts:
          - -Dopengl=enabled
          - -Dvulkan=enabled
          - -Dglslang=disabled
          - -Dd3d11=disabled
          - -Ddemos=False
        sources:
          - type: archive
            url: https://code.videolan.org/videolan/libplacebo/-/archive/v7.349.0/libplacebo-v7.349.0.tar.gz
            sha256: 79120e685a1836344b51b13b6a5661622486a84e4d4a35f6c8d01679a20fbc86
          - type: archive
            url: https://github.com/pallets/jinja/archive/refs/tags/3.1.6.tar.gz
            sha256: 2074b22a72caa65474902234b320d73463d6d4c223ee49f4b433495758356337
            dest: 3rdparty/jinja
          - type: archive
            url: https://github.com/Dav1dde/glad/archive/refs/tags/v2.0.8.tar.gz
            sha256: 44f06f9195427c7017f5028d0894f57eb216b0a8f7c4eda7ce883732aeb2d0fc
            dest: 3rdparty/glad
      - name: libass
        config-opts:
          - --disable-static
        sources:
          - type: archive
            url: https://github.com/libass/libass/releases/download/0.17.3/libass-0.17.3.tar.gz
            sha256: da7c348deb6fa6c24507afab2dee7545ba5dd5bbf90a137bfe9e738f7df68537

  - name: m3p_flutter
    buildsystem: simple
    build-commands:
      - mkdir -p /app/bin
      - cp -r bundle /app/bin/m3p_flutter_app
      - chmod +x /app/bin/m3p_flutter_app/m3p_flutter
      - ln -s /app/bin/m3p_flutter_app/m3p_flutter /app/bin/m3p_flutter
      - install -Dm644 com.m3p.flutter.desktop /app/share/applications/com.m3p.flutter.desktop
      - install -Dm644 com.m3p.flutter.svg /app/share/icons/hicolor/scalable/apps/com.m3p.flutter.svg
    sources:
      - type: dir
        path: build/linux/x64/release/bundle
        dest: bundle
      - type: file
        path: com.m3p.flutter.desktop
      - type: file
        path: com.m3p.flutter.svg
