name: Build Windows Release

on:
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab
  push:
    tags:
      - 'v*' # Automatically run when you push a tag like v0.0.4

jobs:
  build:
    name: Build Windows App
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' # or 'master', depending on your requirements
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Compress Build Output
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath M3Player-Windows.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: M3Player-Windows
          path: M3Player-Windows.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: M3Player-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
